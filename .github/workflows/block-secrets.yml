# Fail CI if the repo contains committed secret paths or API key patterns.
name: Block secrets in repo

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan tracked files for secrets
        run: python scripts/secret_scan.py tracked

      - name: Fail if secret files are tracked by git
        run: python scripts/guard_repo_secrets.py
